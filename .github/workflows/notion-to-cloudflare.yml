name: Sync Notion and Deploy to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - main
  schedule:
    - cron: "10 2 * * *"

permissions:
  contents: read

concurrency:
  group: notion-cloudflare-pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  sync-build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Notion content
        run: npm run sync:notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}

      - name: Build with Astro
        run: npm run build
        env:
          CF_PAGES: "1"

      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler pages deploy dist --project-name "$CLOUDFLARE_PAGES_PROJECT_NAME" --branch "${GITHUB_REF_NAME:-main}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}

      - name: Notify IndexNow
        run: npm run indexnow:sitemap
        env:
          INDEXNOW_KEY: d95e0c5cf5e744158f1f516a7f5a9f24
          INDEXNOW_HOST: tavricccc.github.io

